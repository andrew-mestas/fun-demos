<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gumdrop · electric indigo</title>
<style>
  body {
    margin: 0;
    background: #05050f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: sans-serif;
    color: #aaa;
  }
  canvas { display: block; }
  .param { font-size: 11px; color: #333; margin-top: 6px; letter-spacing: 0.03em; }
  .controls {
    display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
    padding: 0.75rem 0 0; justify-content: center; font-size: 13px;
  }
  .controls label { display: flex; align-items: center; gap: 6px; }
  button {
    background: transparent; border: 0.5px solid #334; color: #aaa;
    padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  button:hover { background: #0a0a1e; }
</style>
</head>
<body>
<canvas id="c" width="480" height="480"></canvas>
<div class="param">gumdrop · electric indigo · γ=2.8 · decay=0.956 · α=0.025</div>
<div class="controls">
  <label>speed <input type="range" id="spd" min="1" max="12" value="5" step="1" style="width:70px"></label>
  <label>exposure <input type="range" id="exp" min="0.5" max="4" value="1.9" step="0.05" style="width:70px"></label>
  <label>contrast <input type="range" id="con" min="0.5" max="4" value="1.75" step="0.05" style="width:70px"></label>
  <button id="rst">reset ↗</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const params = {
  A: [[0.72, -0.78], [0.74, -0.4]],
  gamma: 2.8, decay: 0.956, alpha: 0.025,
  pointSize: 1.5, scaleX: 0.106, scaleY: 0.106,
  intensity: 1.85
};

// Electric Indigo colormap: black → deep indigo → electric blue → white
function colormap(t) {
  t = Math.max(0, Math.min(1, t));
  if (t < 0.4) {
    const s = t / 0.4;
    return [Math.floor(20 * s), 0, Math.floor(180 * s)];
  } else if (t < 0.75) {
    const s = (t - 0.4) / 0.35;
    return [Math.floor(20 + 30 * s), Math.floor(100 * s), Math.floor(180 + 75 * s)];
  } else {
    const s = (t - 0.75) / 0.25;
    return [Math.floor(50 + 205 * s), Math.floor(100 + 155 * s), 255];
  }
}

const W = 480, H = 480;
const density = new Float32Array(W * H);
const MAX_AGE = 200;
let particles = [];

function initParticles(n) {
  particles = [];
  density.fill(0);
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = Math.random() * 0.8 + 0.05;
    particles.push({ x: Math.cos(a)*r, y: Math.sin(a)*r, age: Math.floor(Math.random()*MAX_AGE) });
  }
}

function step(x, y) {
  const r2 = x*x + y*y;
  const nl = Math.tanh(params.gamma * r2) * params.alpha;
  return [
    (params.A[0][0]*x + params.A[0][1]*y + nl*x) * params.decay,
    (params.A[1][0]*x + params.A[1][1]*y + nl*y) * params.decay
  ];
}

function toScreen(x, y) {
  const sx = W/2 + x / params.scaleX;
  const sy = H/2 - y / params.scaleY;
  return [sx, sy];
}

initParticles(2000);

function render() {
  const exposure = parseFloat(document.getElementById('exp').value);
  const contrast = parseFloat(document.getElementById('con').value);
  const imageData = ctx.createImageData(W, H);
  const data = imageData.data;
  let maxD = 0;
  for (let i = 0; i < density.length; i++) if (density[i] > maxD) maxD = density[i];
  if (maxD === 0) return;
  for (let i = 0; i < density.length; i++) {
    let t = density[i] / maxD;
    t = Math.pow(t * exposure, contrast);
    t = Math.min(1, t);
    const [r, g, b] = colormap(t);
    const idx = i * 4;
    data[idx] = r; data[idx+1] = g; data[idx+2] = b; data[idx+3] = t > 0.01 ? 255 : 0;
  }
  ctx.putImageData(imageData, 0, 0);
}

function tick() {
  const spd = parseInt(document.getElementById('spd').value);
  for (let s = 0; s < spd; s++) {
    for (const p of particles) {
      const [nx, ny] = step(p.x, p.y);
      p.x = nx; p.y = ny; p.age++;
      const [sx, sy] = toScreen(p.x, p.y);
      if (p.age > MAX_AGE || sx < 0 || sx >= W || sy < 0 || sy >= H || isNaN(p.x)) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.random() * 0.8 + 0.05;
        p.x = Math.cos(a)*r; p.y = Math.sin(a)*r; p.age = 0;
      } else {
        const idx = Math.floor(sy) * W + Math.floor(sx);
        density[idx] += params.intensity * 0.01;
      }
    }
  }
  render();
  requestAnimationFrame(tick);
}

tick();
document.getElementById('rst').addEventListener('click', () => initParticles(2000));
</script>
</body>
</html>
