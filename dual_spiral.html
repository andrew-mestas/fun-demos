<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dual spiral</title>
<style>
  body {
    margin: 0;
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: sans-serif;
    color: #aaa;
  }
  .dual {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .panel {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .label {
    font-size: 12px;
    margin-bottom: 6px;
    color: #888;
  }
  canvas {
    display: block;
  }
  .controls {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
    padding: 1rem 0 0;
    justify-content: center;
    font-size: 13px;
  }
  .controls label {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  button {
    background: transparent;
    border: 0.5px solid #555;
    color: #aaa;
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  button:hover { background: #222; }
</style>
</head>
<body>

<div class="dual">
  <div class="panel">
    <div class="label">original</div>
    <canvas id="c1" width="240" height="240"></canvas>
  </div>
  <div class="panel">
    <div class="label">remix</div>
    <canvas id="c2" width="240" height="240"></canvas>
  </div>
</div>

<div class="controls">
  <label>speed <input type="range" id="spd" min="1" max="10" value="4" step="1" style="width:80px"></label>
  <button id="rst">reset</button>
</div>

<script>
const systems = [
  { A: [[0.15, 0.9], [-0.9, 0.15]], decay: 0.992, alpha: 0.06, gamma: 2.8, hueBase: 180, canvas: 'c1' },
  { A: [[0.08, 1.3], [-1.3, 0.08]], decay: 0.995, alpha: 0.04, gamma: 2.8, hueBase: 280, canvas: 'c2' }
];

const MAX_AGE = 120;

function initParticles(n) {
  const ps = [];
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = Math.random() * 1.2 + 0.1;
    ps.push({ x: Math.cos(a)*r, y: Math.sin(a)*r, age: Math.floor(Math.random() * MAX_AGE) });
  }
  return ps;
}

function nonlinear(sys, x, y) {
  const r2 = x*x + y*y;
  const nl = Math.tanh(sys.gamma * r2) * sys.alpha;
  return [
    sys.A[0][0]*x + sys.A[0][1]*y + nl * x,
    sys.A[1][0]*x + sys.A[1][1]*y + nl * y
  ];
}

const state = systems.map(sys => ({
  sys,
  ctx: document.getElementById(sys.canvas).getContext('2d'),
  particles: initParticles(800)
}));

function resetAll() {
  for (const s of state) {
    s.particles = initParticles(800);
    s.ctx.clearRect(0, 0, 240, 240);
  }
}

function tick() {
  const spd = parseInt(document.getElementById('spd').value);
  for (const s of state) {
    s.ctx.fillStyle = 'rgba(20,20,25,0.15)';
    s.ctx.fillRect(0, 0, 240, 240);

    for (let st = 0; st < spd; st++) {
      for (const p of s.particles) {
        const [nx, ny] = nonlinear(s.sys, p.x, p.y);
        p.x = nx * s.sys.decay;
        p.y = ny * s.sys.decay;
        p.age++;
        if (p.age > MAX_AGE || Math.abs(p.x) > 3 || Math.abs(p.y) > 3 || isNaN(p.x)) {
          const a = Math.random() * Math.PI * 2;
          const r = Math.random() * 1.2 + 0.1;
          p.x = Math.cos(a)*r; p.y = Math.sin(a)*r; p.age = 0;
        }
      }
    }

    for (const p of s.particles) {
      const sx = 120 + p.x * 75;
      const sy = 120 - p.y * 75;
      const r2 = p.x*p.x + p.y*p.y;
      const hue = (s.sys.hueBase + r2 * 50) % 360;
      const life = 1 - (p.age / MAX_AGE);
      const a = Math.pow(life, 0.6) * 0.9;
      s.ctx.fillStyle = `hsla(${hue}, 90%, 65%, ${a})`;
      s.ctx.fillRect(sx, sy, 1.5, 1.5);
    }
  }
  requestAnimationFrame(tick);
}

tick();
document.getElementById('rst').addEventListener('click', resetAll);
</script>
</body>
</html>
