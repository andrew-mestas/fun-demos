<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gumdrop · cyberpunk glow</title>
<style>
  body { margin: 0; background: #0a0a0e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; color: #aaa; }
  canvas { display: block; }
  .param { font-size: 11px; color: #555; margin-top: 6px; letter-spacing: 0.03em; }
  .controls { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; padding: 0.75rem 0 0; justify-content: center; font-size: 13px; }
  .controls label { display: flex; align-items: center; gap: 6px; }
  button { background: transparent; border: 0.5px solid #555; color: #aaa; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  button:hover { background: #1a1a1e; }
</style>
</head>
<body>
<canvas id="c" width="480" height="480"></canvas>
<div class="param">gumdrop · cyberpunk glow · γ=2.8 · decay=0.956 · α=0.025</div>
<div class="controls">
  <label>speed <input type="range" id="spd" min="1" max="12" value="5" step="1" style="width:70px"></label>
  <label>exposure <input type="range" id="exp" min="0.5" max="4" value="1.9" step="0.05" style="width:70px"></label>
  <button id="rst">reset ↗</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const A = [[0.72, -0.78], [0.74, -0.4]];
const gamma = 2.8, decay = 0.956, alpha = 0.025;
const MAX_AGE = 180;
const SCALE = 110;
let particles = [];

function cyberpunk(t) {
  t = Math.max(0, Math.min(1, t));
  if (t < 0.5) {
    const s = t * 2;
    return `rgb(${Math.floor(200*s)},0,${Math.floor(220*s)})`;
  } else {
    const s = (t - 0.5) * 2;
    return `rgb(255,${Math.floor(20 + 235*s)},255)`;
  }
}

function init(n) {
  particles = [];
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = Math.random() * 1.2 + 0.05;
    particles.push({ x: Math.cos(a)*r, y: Math.sin(a)*r, age: Math.floor(Math.random()*MAX_AGE) });
  }
}

function step(x, y) {
  const r2 = x*x + y*y;
  const nl = Math.tanh(gamma * r2) * alpha;
  return [(A[0][0]*x + A[0][1]*y + nl*x)*decay, (A[1][0]*x + A[1][1]*y + nl*y)*decay];
}

init(1800);

function tick() {
  const spd = parseInt(document.getElementById('spd').value);
  const exp = parseFloat(document.getElementById('exp').value);
  ctx.fillStyle = 'rgba(10,10,14,0.15)';
  ctx.fillRect(0, 0, 480, 480);
  for (let s = 0; s < spd; s++) {
    for (const p of particles) {
      const [nx, ny] = step(p.x, p.y);
      p.x = nx; p.y = ny; p.age++;
      if (p.age > MAX_AGE || Math.abs(p.x) > 4 || Math.abs(p.y) > 4 || isNaN(p.x)) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.random() * 1.2 + 0.05;
        p.x = Math.cos(a)*r; p.y = Math.sin(a)*r; p.age = 0;
      }
    }
  }
  for (const p of particles) {
    const sx = 240 + p.x * SCALE;
    const sy = 240 - p.y * SCALE;
    const r2 = p.x*p.x + p.y*p.y;
    const life = 1 - p.age / MAX_AGE;
    const t = Math.min(1, Math.pow(life, 0.5) * exp * (r2 * 0.4 + 0.3));
    ctx.fillStyle = cyberpunk(t);
    ctx.globalAlpha = Math.pow(life, 0.6) * 0.85;
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(tick);
}
tick();
document.getElementById('rst').addEventListener('click', () => init(1800));
</script>
</body>
</html>
