<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>attractor gallery</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0e;
    color: #aaa;
    font-family: sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    gap: 2rem;
  }
  h1 {
    font-size: 14px;
    letter-spacing: 0.15em;
    color: #555;
    text-transform: lowercase;
  }
  .gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 2rem;
    justify-content: center;
    width: 100%;
  }
  .panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }
  .label {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: #555;
    text-transform: lowercase;
  }
  iframe {
    border: none;
    border-radius: 8px;
    background: #0a0a0e;
    width: 540px;
    height: 580px;
  }
  @media (max-width: 600px) {
    iframe { width: 340px; height: 420px; }
  }
</style>
</head>
<body>

<h1>attractor gallery</h1>

<div class="gallery">
  <div class="panel">
    <div class="label">dual spiral</div>
    <iframe src="dual_spiral.html" title="dual spiral attractor"></iframe>
  </div>
  <div class="panel">
    <div class="label">blade attractor</div>
    <iframe src="blade_attractor.html" title="blade attractor"></iframe>
  </div>
</div>

</body>
</html>
